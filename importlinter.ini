[importlinter]
root_package = affilabs.core

# Initial contracts enforce one-way dependencies from lower layers to higher layers.
# We intentionally avoid blocking UI -> core imports for now to fit current code.

[contract:no_core_dep_on_ui]
type = forbidden
source = affilabs.core
forbidden =
    affilabs.affilabs_core_ui,
    affilabs.ui,
    affilabs.widgets,
    affilabs.sidebar_tabs,
    affilabs.dialogs,
    affilabs.presenters,
    affilabs.viewmodels,
    affilabs.affilabs_sidebar,
    affilabs.sections

; Scoped contracts temporarily to core only to stabilise scanning
