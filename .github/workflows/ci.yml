name: ci

on:
  pull_request:
  push:
    branches: [ main, master, v2.0.5-beta ]

jobs:
  safe-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Syntax-only compile — never modifies files, never blocks on style
      - name: Check Python syntax (affilabs/)
        run: python -m compileall -q affilabs/

      # Validate critical JSON configs are parseable
      - name: Validate JSON configs
        run: |
          python -c "
          import json, sys, pathlib
          files = list(pathlib.Path('config').glob('*.json')) + \
                  list(pathlib.Path('settings').glob('*.json')) + \
                  list(pathlib.Path('detector_profiles').glob('*.json'))
          errors = []
          for f in files:
              try:
                  json.loads(f.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('JSON errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          print(f'OK — {len(files)} config files valid')
          "

      # Catch accidental merge conflict markers left in source
      - name: Check for merge conflict markers
        run: |
          if grep -rn "^<<<<<<< \|^=======$\|^>>>>>>> " affilabs/ --include="*.py"; then
            echo "Merge conflict markers found — resolve before pushing"
            exit 1
          fi
          echo "OK — no merge conflict markers"
