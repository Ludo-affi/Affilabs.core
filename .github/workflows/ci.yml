name: ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files

      # Optional analysis reports (non-blocking)
      - name: Install analysis tools
        run: |
          pip install vulture xenon radon

      - name: Vulture report (core/services/hardware)
        run: vulture --min-confidence 90 affilabs/core affilabs/services affilabs/hardware || true

      - name: Xenon complexity gate (B/B/B)
        run: xenon --max-absolute B --max-modules B --max-average B affilabs/core affilabs/services affilabs/hardware || true

      - name: Radon complexity summary (B+)
        run: radon cc -n B -s affilabs/core affilabs/services affilabs/hardware || true
